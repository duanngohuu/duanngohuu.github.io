<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#4338ca"><title>JLPT Practice · Đang tải</title><style>:root{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#102a43;background:#f4f7fb}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px}.card{width:min(720px,100%);background:#fff;border:1px solid #d9e2ec;border-radius:18px;padding:22px;box-shadow:0 16px 50px #102a4320}.spin{width:40px;height:40px;border:4px solid #d9e2ec;border-top-color:#4f46e5;border-radius:50%;animation:r .9s linear infinite;margin-bottom:14px}@keyframes r{to{transform:rotate(360deg)}}h1{font-size:21px;margin:0 0 7px}p{color:#627d98}.status{background:#eef2ff;border-radius:12px;padding:10px 12px}.error{background:#ffebee;color:#9b1c1c}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button,a.btn{border:0;border-radius:10px;padding:9px 12px;background:#e9eef5;color:#102a43;text-decoration:none;font:600 14px system-ui;cursor:pointer}.primary{background:#4f46e5!important;color:#fff!important}pre{display:none;margin-top:12px;max-height:45vh;overflow:auto;white-space:pre-wrap;overflow-wrap:anywhere;background:#07111e;color:#d8e9fa;padding:10px;border-radius:10px;font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace}</style></head><body><main class="card"><div class="spin" id="spin"></div><h1>Đang tải JLPT Practice…</h1><p>57 kỳ hợp lệ · 1.057 問題 · nguồn tĩnh công khai</p><div class="status" id="status">Đang kết nối nguồn Drive…</div><div class="actions" id="actions" hidden><button class="primary" id="retry">Thử lại</button><button id="copy">Sao chép log</button><button id="toggle">Xem Debug</button><a class="btn" id="direct" target="_blank" rel="noopener">Mở nguồn trực tiếp</a></div><pre id="log"></pre></main><script>(()=>{'use strict';const VERSION='2026.07.07-drive-loader.2',KEY='jlpt-loader-debug-v1',ID='13YODojxX3szSZ5mdE5T40PrLumXl-sGo';const URLS=[`https://drive.google.com/uc?export=download&id=${ID}&confirm=t`,`https://drive.usercontent.google.com/download?id=${ID}&export=download&confirm=t`,`https://drive.google.com/uc?export=view&id=${ID}`];let logs=[];const $=id=>document.getElementById(id),safe=v=>{try{return typeof v==='string'?v:JSON.stringify(v)}catch{return String(v)}};function persist(){try{sessionStorage.setItem(KEY,JSON.stringify(logs.slice(-150)))}catch{}}function add(level,event,detail=''){logs.push({time:new Date().toISOString(),level,event,detail:safe(detail)});persist();$('log').textContent=logs.map(x=>`${x.time} [${x.level.toUpperCase()}] ${x.event}${x.detail?'\n  '+x.detail:''}`).join('\n');(level==='error'?console.error:console.log)('[JLPT LOADER]',event,detail)}async function get(url){const st=performance.now();add('info','fetch:start',{version:VERSION,url,online:navigator.onLine});try{const r=await fetch(url,{cache:'no-store',redirect:'follow'}),body=await r.text(),valid=/<!doctype html/i.test(body)&&/const EMBEDDED_DATA=/.test(body)&&body.length>3000000;add(r.ok&&valid?'info':'error','fetch:response',{requestedUrl:url,finalUrl:r.url,http:r.status,statusText:r.statusText,type:r.type,redirected:r.redirected,contentType:r.headers.get('content-type'),contentDisposition:r.headers.get('content-disposition'),bytes:new Blob([body]).size,elapsedMs:Math.round(performance.now()-st),validStandalone:valid,sample:body.slice(0,260)});if(!r.ok)throw Error(`HTTP ${r.status} ${r.statusText}`);if(!valid)throw Error('Response không phải JLPT standalone hợp lệ.');return body}catch(e){add('error','fetch:exception',{url,name:e.name,message:e.message,elapsedMs:Math.round(performance.now()-st)});throw e}}async function load(){logs=[];persist();$('status').className='status';$('status').textContent='Đang kết nối nguồn Drive…';$('actions').hidden=true;$('spin').style.display='block';add('info','loader:init',{version:VERSION,page:location.href,fileId:ID,userAgent:navigator.userAgent});let last;for(const url of URLS){try{let html=await get(url);add('info','loader:success',{url,htmlBytes:html.length});const inject='<scr'+'ipt src="./debug-overlay.js?v=20260707-1"></scr'+'ipt>';html=html.replace('</head>',inject+'\n</head>');persist();document.open();document.write(html);document.close();return}catch(e){last=e}}$('spin').style.display='none';$('status').className='status error';$('status').textContent=`Không tải được app: ${last?.message||'Lỗi chưa xác định'}`;$('actions').hidden=false;add('error','loader:all-sources-failed',{endpoints:URLS,lastError:last?.message||String(last)})} $('retry').onclick=load;$('copy').onclick=async()=>{try{await navigator.clipboard.writeText($('log').textContent);$('copy').textContent='Đã sao chép';setTimeout(()=>$('copy').textContent='Sao chép log',1200)}catch{prompt('Sao chép log:',$('log').textContent)}};$('toggle').onclick=()=>{$('log').style.display=$('log').style.display==='block'?'none':'block'};$('direct').href=URLS[2];window.addEventListener('error',e=>add('error','window:error',{message:e.message,file:e.filename,line:e.lineno,column:e.colno}));window.addEventListener('unhandledrejection',e=>add('error','promise:unhandled',{reason:String(e.reason?.stack||e.reason)}));load()})();</script></body></html>
