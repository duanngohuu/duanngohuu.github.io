<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#102a43"><title>JLPT Practice</title><style>html,body{margin:0;min-height:100%;background:#f4f7fb;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#102a43}.boot{min-height:100vh;display:grid;place-items:center;padding:24px}.box{background:#fff;border:1px solid #d9e2ec;border-radius:18px;padding:22px;max-width:520px;box-shadow:0 12px 36px #102a4318}.spin{width:34px;height:34px;border:4px solid #d9e2ec;border-top-color:#1363df;border-radius:50%;animation:r 1s linear infinite;margin-bottom:13px}@keyframes r{to{transform:rotate(360deg)}}.err{color:#a31313;white-space:pre-wrap}.box a{color:#1363df}</style></head><body><div class="boot"><div class="box"><div class="spin"></div><b>Đang khởi động JLPT Practice…</b><p id="msg">Đang nạp giao diện và bộ Debug.</p></div></div><script>(()=>{const CORE='https://raw.githubusercontent.com/duanngohuu/duanngohuu.github.io/8c30b930d8bb7c9215d4c17a8f16be2eeebf7d73/jlpt/index.html';fetch(CORE,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error('HTTP '+r.status);return r.text()}).then(html=>{const tag='<script src="./debug-overlay.js?v=20260706-2"><\/script>';html=html.replace('</head>',tag+'\n</head>');document.open();document.write(html);document.close()}).catch(e=>{const m=document.getElementById('msg');m.className='err';m.innerHTML='Không nạp được giao diện: '+e.message+'\n\n<a href="./debug.html">Mở trang Debug</a>'})})();</script></body></html>
