<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#102a43">
<title>JLPT Practice · N1/N2 theo 問題</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#102a43;--muted:#627d98;--line:#d9e2ec;--brand:#1363df;--brand2:#0b4fb3;--ok:#16803a;--bad:#c62828;--warn:#8a5b00;--shadow:0 12px 36px rgba(16,42,67,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button,select,input{font:inherit}.top{position:sticky;top:0;z-index:20;background:rgba(16,42,67,.96);color:#fff;backdrop-filter:blur(12px);box-shadow:0 4px 18px rgba(0,0,0,.16)}.topin{max-width:1180px;margin:auto;padding:12px 16px;display:flex;align-items:center;gap:12px}.brand{font-weight:800;font-size:18px;white-space:nowrap}.brand small{font-weight:500;opacity:.75}.nav{margin-left:auto;display:flex;gap:8px}.nav a{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.3);padding:7px 10px;border-radius:10px}.wrap{max-width:1180px;margin:18px auto;padding:0 16px 80px}.hero{background:linear-gradient(135deg,#102a43,#174f85);color:#fff;padding:22px;border-radius:20px;box-shadow:var(--shadow)}.hero h1{font-size:clamp(23px,4vw,38px);margin:0 0 5px}.hero p{margin:0;opacity:.82}.status{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}.pill{background:rgba(255,255,255,.13);padding:5px 9px;border-radius:999px;font-size:13px}.grid{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;margin-top:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow)}.card h2{margin:0 0 13px;font-size:18px}.form{display:grid;grid-template-columns:1fr 1fr;gap:11px}.field{display:flex;flex-direction:column;gap:5px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:700;color:var(--muted)}select,input{width:100%;border:1px solid var(--line);border-radius:11px;background:#fff;padding:10px 11px;color:var(--ink)}.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.check{display:flex;align-items:center;gap:7px;color:var(--muted)}.check input{width:auto}.btn{border:0;border-radius:12px;padding:11px 15px;font-weight:750;cursor:pointer}.btn.primary{background:var(--brand);color:#fff}.btn.primary:hover{background:var(--brand2)}.btn.soft{background:#eaf2ff;color:#0b4fb3}.btn.ghost{background:#edf2f7;color:var(--ink)}.btn:disabled{opacity:.45;cursor:not-allowed}.start{width:100%;margin-top:13px}.notice{border-radius:12px;padding:11px 12px;margin-top:12px;background:#eaf2ff;color:#174f85}.notice.error{background:#ffebee;color:#9b1c1c}.notice.warn{background:#fff5d8;color:#795300}.hidden{display:none!important}.empty{color:var(--muted);padding:34px 10px;text-align:center}.head{display:flex;gap:10px;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:12px}.head h2{margin:0}.meta{font-size:13px;color:var(--muted)}.progress{height:8px;background:#e7eef5;border-radius:99px;overflow:hidden;margin:12px 0}.progress>i{display:block;height:100%;background:var(--brand);width:0}.examtext{white-space:pre-wrap;overflow-wrap:anywhere;font-family:"Noto Sans JP",system-ui,sans-serif;font-size:16px;line-height:1.9;background:#fbfcfe;border:1px solid var(--line);border-radius:14px;padding:18px;max-height:58vh;overflow:auto}.answerbox{margin-top:14px}.answergrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px}.qrow{border:1px solid var(--line);border-radius:12px;padding:10px}.qtitle{font-weight:800;margin-bottom:7px}.choices{display:flex;gap:6px}.choice{width:36px;height:36px;border-radius:10px;border:1px solid #b7c7d8;background:#fff;cursor:pointer;font-weight:800}.choice.selected{background:var(--brand);color:#fff;border-color:var(--brand)}.choice.correct{background:#daf5e2;color:#116530;border-color:#55b875}.choice.wrong{background:#ffe1e1;color:#a31313;border-color:#e57373}.score{font-size:18px;font-weight:850;margin:12px 0}.score.ok{color:var(--ok)}.actions{display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-top:14px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}.stat{background:#f4f7fb;border-radius:12px;padding:10px;text-align:center}.stat b{display:block;font-size:19px}.stat small{color:var(--muted)}@media(max-width:820px){.grid{grid-template-columns:1fr}.topin{padding:10px 12px}.brand small{display:none}.wrap{padding:0 10px 70px;margin-top:10px}.hero{padding:17px}.card{padding:13px;border-radius:15px}.form{grid-template-columns:1fr 1fr}.examtext{font-size:15px;padding:13px;max-height:none}.nav a{font-size:12px;padding:6px 8px}.answergrid{grid-template-columns:1fr}}@media(max-width:460px){.form{grid-template-columns:1fr}.field.full{grid-column:auto}.hero h1{font-size:23px}.stats{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand">JLPT Practice <small>· N1/N2</small></div><nav class="nav"><a href="../flashcard/">Flashcard</a><a href="../">Trang chủ</a></nav></div></header>
<main class="wrap">
<section class="hero"><h1>Luyện thi theo 問題 qua các năm</h1><p>Chọn đúng môn và 問題 cần luyện, không phải làm nguyên cả đề.</p><div class="status"><span class="pill" id="dataState">Đang tải dữ liệu…</span><span class="pill">57 kỳ hợp lệ</span><span class="pill">1.057 問題</span></div></section>
<div class="grid">
<aside class="card"><h2>Thiết lập bài luyện</h2><div class="form">
<div class="field"><label>Trình độ</label><select id="level"><option>N2</option><option>N1</option></select></div>
<div class="field"><label>Môn</label><select id="subject"></select></div>
<div class="field"><label>問題</label><select id="mondai"></select></div>
<div class="field"><label>Số bài</label><select id="limit"><option value="5">5 kỳ</option><option value="10" selected>10 kỳ</option><option value="20">20 kỳ</option><option value="999">Tất cả</option></select></div>
<div class="field"><label>Từ năm</label><input id="fromYear" type="number" min="2010" max="2026" value="2010"></div>
<div class="field"><label>Đến năm</label><input id="toYear" type="number" min="2010" max="2026" value="2025"></div>
<div class="field full"><label>Thứ tự</label><div class="row"><label class="check"><input id="shuffle" type="checkbox"> Trộn ngẫu nhiên</label><label class="check"><input id="unlearned" type="checkbox"> Ưu tiên chưa học</label></div></div>
</div><button id="start" class="btn primary start" disabled>Bắt đầu</button><div id="loadNotice" class="notice">Đang đọc dữ liệu Google Sheet…</div>
<div class="stats"><div class="stat"><b id="learnedStat">0</b><small>đã học</small></div><div class="stat"><b id="correctStat">0</b><small>đúng</small></div><div class="stat"><b id="streakStat">0</b><small>chuỗi</small></div></div></aside>
<section class="card" id="practice"><div class="empty" id="empty">Chọn cấu hình rồi bấm <b>Bắt đầu</b>.</div><div id="content" class="hidden">
<div class="head"><div><h2 id="title"></h2><div class="meta" id="meta"></div></div><button class="btn ghost" id="reset">Làm lại</button></div><div class="progress"><i id="bar"></i></div><div id="examText" class="examtext"></div><div class="answerbox"><h3>Chọn đáp án</h3><div id="answerGrid" class="answergrid"></div><div id="score" class="score"></div><div class="actions"><button class="btn ghost" id="prev">← Trước</button><div class="row"><button class="btn soft" id="showAnswer">Hiện đáp án</button><button class="btn primary" id="grade">Chấm điểm</button></div><button class="btn ghost" id="next">Tiếp →</button></div></div></div></section>
</div></main>
<script>
(()=>{'use strict';
const SHEET='1X0upcKEDz1SH2zFimbKwo7n_zo4MfsXls-S8MAEX9OM', TAB='JLPT_DATA';
const $=id=>document.getElementById(id), state={units:[],list:[],index:0,answers:{},graded:false};
const subjects={vocab:'文字・語彙',grammar:'文法',reading:'読解',listening:'聴解'};
const storageKey='jlpt-practice-progress-v1';
function progress(){try{return JSON.parse(localStorage.getItem(storageKey)||'{"units":{},"correct":0,"attempts":0,"streak":0}')}catch{return {units:{},correct:0,attempts:0,streak:0}}}
function save(p){localStorage.setItem(storageKey,JSON.stringify(p));updateStats()}
function updateStats(){const p=progress();$('learnedStat').textContent=Object.keys(p.units||{}).length;$('correctStat').textContent=p.correct||0;$('streakStat').textContent=p.streak||0}
function parseGviz(text){const a=text.indexOf('{'),b=text.lastIndexOf('}');if(a<0||b<a)throw Error('Google Sheet trả dữ liệu không hợp lệ.');const j=JSON.parse(text.slice(a,b+1));if(j.status==='error')throw Error(j.errors?.[0]?.detailed_message||'Không đọc được dữ liệu.');const cols=(j.table.cols||[]).map((c,i)=>String(c.label||c.id||i));return (j.table.rows||[]).map(r=>{const o={};cols.forEach((c,i)=>o[c]=r.c?.[i]?.v??r.c?.[i]?.f??'');return o})}
function normalize(r){let map={};try{map=JSON.parse(r.answers_json||'{}')}catch{};return{unit_id:String(r.unit_id||''),session_id:String(r.session_id||''),level:String(r.level||''),year:+r.year,month:+r.month,exam_label:String(r.exam_label||''),subject:String(r.subject||''),subject_slug:String(r.subject_slug||''),mondai:+r.mondai,question_numbers:String(r.question_numbers||'').split(',').map(Number).filter(Number.isFinite),question_count:+r.question_count||0,answer_status:String(r.answer_status||'manual'),answer_map:map,raw_text:String(r.raw_text||''),source_pdf_name:String(r.source_pdf_name||'')}}
async function load(){const url=`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?sheet=${encodeURIComponent(TAB)}&range=A1:Q1100&headers=1&tqx=out:json&_=${Date.now()}`;const ctl=new AbortController(),timer=setTimeout(()=>ctl.abort(),20000);try{const res=await fetch(url,{cache:'no-store',signal:ctl.signal});if(!res.ok)throw Error('HTTP '+res.status);const rows=parseGviz(await res.text());state.units=rows.map(normalize).filter(x=>x.unit_id&&x.raw_text);if(!state.units.length)throw Error('Tab JLPT_DATA chưa được cấp quyền liên kết nguồn.');$('dataState').textContent=`Đã tải ${state.units.length.toLocaleString('vi-VN')} 問題`;$('loadNotice').classList.add('hidden');$('start').disabled=false;refreshSubjects()}catch(e){$('dataState').textContent='Chưa tải được dữ liệu';$('loadNotice').className='notice error';$('loadNotice').innerHTML=`${e.name==='AbortError'?'Google Sheet phản hồi quá chậm.':e.message}<br><small>Mở sheet nguồn và bấm “Cho phép truy cập / Allow access” tại tab JLPT_DATA một lần.</small>`}finally{clearTimeout(timer)}}
function unique(a){return [...new Set(a)]}
function refreshSubjects(){const lv=$('level').value;const ss=unique(state.units.filter(u=>u.level===lv).map(u=>u.subject_slug)).sort();$('subject').innerHTML=ss.map(s=>`<option value="${s}">${subjects[s]||s}</option>`).join('');refreshMondai()}
function refreshMondai(){const lv=$('level').value,s=$('subject').value;const ms=unique(state.units.filter(u=>u.level===lv&&u.subject_slug===s).map(u=>u.mondai)).sort((a,b)=>a-b);$('mondai').innerHTML=ms.map(m=>`<option value="${m}">問題 ${m}</option>`).join('')}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){const lv=$('level').value,s=$('subject').value,m=+$('mondai').value,fy=+$('fromYear').value,ty=+$('toYear').value,lim=+$('limit').value,p=progress();let list=state.units.filter(u=>u.level===lv&&u.subject_slug===s&&u.mondai===m&&u.year>=fy&&u.year<=ty);list.sort((a,b)=>a.year-b.year||a.month-b.month);if($('unlearned').checked)list.sort((a,b)=>(p.units?.[a.unit_id]?1:0)-(p.units?.[b.unit_id]?1:0)||a.year-b.year||a.month-b.month);if($('shuffle').checked)shuffle(list);state.list=list.slice(0,lim);state.index=0;if(!state.list.length){$('loadNotice').className='notice warn';$('loadNotice').textContent='Không có bài phù hợp với bộ lọc này.';$('loadNotice').classList.remove('hidden');return}$('loadNotice').classList.add('hidden');$('empty').classList.add('hidden');$('content').classList.remove('hidden');render()}
function render(){const u=state.list[state.index];state.answers={};state.graded=false;$('title').textContent=`${u.level} · ${subjects[u.subject_slug]||u.subject} · 問題 ${u.mondai}`;$('meta').textContent=`${u.exam_label} · ${state.index+1}/${state.list.length} · ${u.source_pdf_name}`;$('bar').style.width=`${(state.index+1)/state.list.length*100}%`;$('examText').textContent=u.raw_text;$('score').textContent='';$('score').className='score';$('answerGrid').innerHTML=u.question_numbers.map(q=>`<div class="qrow" data-q="${q}"><div class="qtitle">Câu ${q}</div><div class="choices">${[1,2,3,4].map(c=>`<button class="choice" data-c="${c}">${c}</button>`).join('')}</div></div>`).join('')||'<div class="notice warn">PDF không tách được số câu. Dùng nút “Hiện đáp án” để tự đối chiếu.</div>';$('answerGrid').querySelectorAll('.choice').forEach(b=>b.onclick=()=>choose(b));$('prev').disabled=state.index===0;$('next').disabled=state.index===state.list.length-1;$('grade').disabled=!Object.keys(u.answer_map).length;$('showAnswer').disabled=!Object.keys(u.answer_map).length;window.scrollTo({top:0,behavior:'smooth'})}
function choose(btn){if(state.graded)return;const row=btn.closest('.qrow'),q=row.dataset.q;row.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));btn.classList.add('selected');state.answers[q]=+btn.dataset.c}
function mark(showScore){const u=state.list[state.index],keys=Object.keys(u.answer_map||{});if(!keys.length)return;let correct=0,answered=0;for(const q of keys){const right=+u.answer_map[q],chosen=state.answers[q];if(chosen)answered++;if(chosen===right)correct++;const row=$('answerGrid').querySelector(`[data-q="${CSS.escape(String(q))}"]`);if(!row)continue;row.querySelectorAll('.choice').forEach(b=>{const c=+b.dataset.c;b.classList.remove('correct','wrong');if(c===right)b.classList.add('correct');else if(chosen===c)b.classList.add('wrong')})}state.graded=true;if(showScore){const pct=keys.length?Math.round(correct/keys.length*100):0;$('score').textContent=`${correct}/${keys.length} câu đúng · ${pct}%${answered<keys.length?` · còn ${keys.length-answered} câu chưa chọn`:''}`;$('score').className='score '+(pct>=70?'ok':'');const p=progress();p.units=p.units||{};if(!p.units[u.unit_id]){p.attempts=(p.attempts||0)+keys.length;p.correct=(p.correct||0)+correct;p.streak=correct===keys.length?(p.streak||0)+1:0}p.units[u.unit_id]={correct,total:keys.length,at:Date.now()};save(p)}}
$('level').onchange=refreshSubjects;$('subject').onchange=refreshMondai;$('start').onclick=start;$('grade').onclick=()=>mark(true);$('showAnswer').onclick=()=>mark(false);$('reset').onclick=render;$('prev').onclick=()=>{if(state.index>0){state.index--;render()}};$('next').onclick=()=>{if(state.index<state.list.length-1){state.index++;render()}};updateStats();load();
})();
</script></body></html>
