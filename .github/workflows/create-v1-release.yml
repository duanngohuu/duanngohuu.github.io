name: Create v1 Release

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/create-v1-release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TARGET_SHA="$(git rev-parse HEAD^)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin refs/tags/v1 >/dev/null 2>&1; then
            echo "Tag v1 already exists."
          else
            git tag -a v1 "$TARGET_SHA" -m "v1"
            git push origin refs/tags/v1
          fi

          if gh release view v1 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v1 already exists."
          else
            gh release create v1 \
              --repo "$GITHUB_REPOSITORY" \
              --title "v1" \
              --notes "Flashcard v1 stable release." \
              --verify-tag
          fi
