name: Bump JLPT listening cache
on:
  push:
    paths:
      - '.github/workflows/bump-jlpt-listening-cache.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh JLPT asset version
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p=Path('jlpt/index.html')
          s=p.read_text(encoding='utf-8')
          s,n=re.subn(r'debug-overlay\.js\?v=[^"\']+', 'debug-overlay.js?v=20260707-3', s)
          if not n:
              raise SystemExit('debug-overlay reference not found')
          p.write_text(s,encoding='utf-8')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add jlpt/index.html
          git diff --cached --quiet || git commit -m 'Refresh JLPT Listening Lab cache'
          git push
